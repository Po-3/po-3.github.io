name: Auto Update Loto6 Data

on:
  schedule:
    - cron: '0 12 * * 1,4'  # 月・木 21:00 JST
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
          
      - name: 📁 Create directories
        run: mkdir -p assets/data
          
      - name: 🎱 Create test data
        run: |
          echo '[{"drawNumber":1900,"drawDate":"2025-01-30","numbers":[3,11,18,25,32,40],"bonusNumber":2,"carryOver":0}]' > assets/data/latest.json
          echo "✅ Test data created successfully"
          
      - name: 💾 Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/data/*.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎱 Auto-update: Loto6 test data"
            git push
          fi
