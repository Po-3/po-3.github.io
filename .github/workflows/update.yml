name: Auto Update Loto6 Data

on:
  schedule:
    - cron: '0 12 * * 1,4'  # 月・木 21:00 JST
  workflow_dispatch:        # 手動実行可能

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 📁 Create directory structure
        run: |
          mkdir -p loto6/assets/data
          echo "✅ Directory created: loto6/assets/data"
          
      - name: 🎱 Generate structured data
        run: |
          cat > loto6/assets/data/latest.json << 'EOF'
          [
            {
              "drawNumber": 1900,
              "drawDate": "2025-01-30",
              "numbers": [3, 11, 18, 25, 32, 40],
              "bonusNumber": 2,
              "prizes": {
                "1": {"winners": 1, "amount": 200000000},
                "2": {"winners": 3, "amount": 15000000},
                "3": {"winners": 50, "amount": 500000},
                "4": {"winners": 500, "amount": 10000},
                "5": {"winners": 5000, "amount": 1000}
              },
              "carryOver": 0
            }
          ]
          EOF
          
          # history.jsonも同時作成
          cp loto6/assets/data/latest.json loto6/assets/data/history.json
          
          echo "✅ Data files created successfully"
          echo "📁 File structure:"
          ls -la loto6/assets/data/
          
      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add loto6/assets/data/*.json
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            git commit -m "🎱 Fix: Save data to correct loto6/assets/data directory ($TIMESTAMP)"
            git push
          fi
