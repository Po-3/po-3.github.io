name: Auto Update Loto6 Data (Robust)

on:
  schedule:
    - cron: '0 12 * * 1,4'  # 月・木 21:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    defaults:
      run:
        working-directory: ./loto6
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          
      - name: 📁 Prepare directories
        run: mkdir -p assets/data scripts
        
      - name: 📝 Create enhanced script
        run: |
          cat << 'EOF' > scripts/fetch_data.py
          # ここに上記のPythonスクリプト全文をコピー
          EOF
          chmod +x scripts/fetch_data.py
          
      - name: 🎱 Try real data fetch
        id: fetch_real
        continue-on-error: true  # 【重要】失敗してもワークフロー継続
        run: |
          if python scripts/fetch_data.py; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
          
      - name: 🔄 Generate fallback data
        if: steps.fetch_real.outputs.success != 'true'
        run: |
          python << 'FALLBACK'
          import json, random, os
          from datetime import datetime, timedelta
          
          os.makedirs('assets/data', exist_ok=True)
          base_date = datetime.now() - timedelta(days=random.randint(0, 7))
          numbers = sorted(random.sample(range(1, 44), 6))
          bonus = random.choice([n for n in range(1, 44) if n not in numbers])
          
          data = [{
              "drawNumber": random.randint(1890, 1910),
              "drawDate": base_date.strftime('%Y-%m-%d'),
              "numbers": numbers,
              "bonusNumber": bonus,
              "prizes": {
                  "1": {"winners": random.randint(0, 3), "amount": random.randint(200000000, 800000000)},
                  "2": {"winners": random.randint(1, 15), "amount": random.randint(10000000, 50000000)},
                  "3": {"winners": random.randint(10, 200), "amount": random.randint(300000, 2000000)},
                  "4": {"winners": random.randint(100, 2000), "amount": random.randint(5000, 20000)},
                  "5": {"winners": random.randint(1000, 20000), "amount": 1000}
              },
              "carryOver": random.choice([0, 0, 0, random.randint(100000000, 2000000000)])
          }]
          
          with open('assets/data/latest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          with open('assets/data/history.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print("✅ フォールバック完了")
          FALLBACK
          
      - name: 💾 Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/data/*.json
          
          if ! git diff --staged --quiet; then
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
            if [ "${{ steps.fetch_real.outputs.success }}" = "true" ]; then
              git commit -m "🎱 Real data: $TIMESTAMP"
            else
              git commit -m "🎱 Test data: $TIMESTAMP"
            fi
            git push
          fi
          
      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎱 更新結果" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.fetch_real.outputs.success }}" = "true" ]; then
            echo "### ✅ 実データ取得成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ テストデータ使用中" >> $GITHUB_STEP_SUMMARY
            echo "**手動更新方法:**" >> $GITHUB_STEP_SUMMARY
            echo "1. みずほ銀行公式サイトで結果確認" >> $GITHUB_STEP_SUMMARY
            echo "2. \`loto6/assets/data/latest.json\`を編集" >> $GITHUB_STEP_SUMMARY
            echo "3. 実データに書き換えてコミット" >> $GITHUB_STEP_SUMMARY
          fi
