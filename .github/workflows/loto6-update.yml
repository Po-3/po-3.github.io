name: Update Loto6 Data

on:
  schedule:
    # JST 19:30 / 20:00 / 20:30（月・木）
    # GitHub Actions の cron は UTC
    # JST = UTC+9
    - cron: "30 10 * * 1,4"
    - cron: "0 11 * * 1,4"
    - cron: "30 11 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show working directory
        run: |
          pwd
          ls -la
          echo "----- root files -----"
          find . -maxdepth 2 -type f | sort
          echo "----- scripts -----"
          ls -la scripts || true

      - name: Install dependencies
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run fetch script
        run: |
          python scripts/fetch_data.py

      - name: Show updated files
        run: |
          echo "===== latest.json ====="
          cat assets/data/latest.json || true
          echo
          echo "===== history.json head ====="
          python - <<'PY'
          import json
          from pathlib import Path

          history_path = Path("assets/data/history.json")
          if history_path.exists():
              data = json.loads(history_path.read_text(encoding="utf-8"))
              print(json.dumps(data[:3], ensure_ascii=False, indent=2))
          else:
              print("history.json not found")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/latest.json assets/data/history.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "auto update loto6 data"
          git push
