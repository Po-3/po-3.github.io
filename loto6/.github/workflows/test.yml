name: Auto Update Loto6 Data

on:
  schedule:
    - cron: '0 12 * * 1,4'  # 月・木 21:00 JST
  workflow_dispatch:
    inputs:
      force_update:
        description: '強制更新を実行'
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: 📁 Create directories
        run: mkdir -p assets/data
      
      - name: 🎱 Fetch data
        id: fetch
        run: |
          cd scripts
          if python fetch_data.py; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: 🔎 Check changes
        id: changes
        run: |
          if git diff --quiet assets/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: 💾 Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/data/*.json
          
          TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')
          git commit -m "🎱 Auto-update: Loto6 data ($TIMESTAMP)"
          
          # リトライ機能付きプッシュ
          for i in {1..3}; do
            if git push; then
              echo "✅ Push successful"
              break
            else
              echo "⚠️ Push failed, retrying..."
              sleep 5
              git pull --rebase
            fi
          done
      
      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎱 実行結果" >> $GITHUB_STEP_SUMMARY
          echo "- **日時**: $(TZ=Asia/Tokyo date)" >> $GITHUB_STEP_SUMMARY
          echo "- **取得**: ${{ steps.fetch.outputs.success == 'true' && '✅ 成功' || '❌ 失敗' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **更新**: ${{ steps.changes.outputs.changed == 'true' && '✅ あり' || '➖ なし' }}" >> $GITHUB_STEP_SUMMARY
