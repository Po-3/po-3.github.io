<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>かなトク！還元計算</title>
<meta name="description" content="かながわトクトクキャンペーン『かなトク！』の還元額を記録・計算するアプリ" />

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="かなトク！" />

<style>
  :root{
    --bg:#e9eef5;
    --navy:#13294b;
    --navy-grad-a:#1b3a63;
    --navy-grad-b:#0f2238;
    --orange:#f5a623;
    --orange-strong:#ff9a00;
    --blue:#2d7ff0;
    --blue-deep:#1f6feb;
    --blue-soft:#e9f2ff;
    --card:#ffffff;
    --text:#13294b;
    --muted:#8b98aa;
    --muted-2:#aab4c2;
    --line:#eaeef4;
    --track:#e4e9f0;
    --radius:18px;
    --shadow:0 8px 22px rgba(20,40,80,.08);
    --shadow-soft:0 2px 8px rgba(20,40,80,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    overscroll-behavior-y:none;
  }
  .app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* ===== ヘッダー ===== */
  .app-header{
    position:sticky;top:0;z-index:30;
    background:#ffffff;
    color:var(--navy);
    padding:calc(env(safe-area-inset-top) + 10px) 14px 12px;
    display:flex;align-items:center;justify-content:center;
    border-bottom:1px solid #e7ecf3;
    box-shadow:0 2px 12px rgba(20,40,80,.07);
  }
  .brand{display:flex;align-items:center;justify-content:center;width:100%;}
  .brand-logo{height:60px;width:auto;max-width:88vw;object-fit:contain;display:block;}
  .brand-link{display:inline-flex;max-width:100%;}
  .brand-link:active{opacity:.7;}
  .brand .kana{
    background:var(--orange);color:#12243f;
    border-radius:10px;padding:2px 10px;margin-right:6px;font-weight:900;
    box-shadow:0 2px 6px rgba(0,0,0,.18);
  }
  .brand .excl{color:var(--orange);}
  .header-total{flex:none;text-align:right;line-height:1.1;background:var(--navy);border-radius:13px;padding:7px 13px;box-shadow:0 3px 10px rgba(20,40,80,.22);}
  .header-total .lbl{font-size:10px;color:#aebfd6;font-weight:700;}
  .header-total .val{font-size:21px;font-weight:900;color:#ffb02e;}

  /* ===== 本体 ===== */
  main{flex:1;padding:16px 14px 96px;}
  .view{display:none;animation:fade .25s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  /* ヒーローカード（還元状況） */
  .hero-wrap{position:sticky;top:var(--header-h,82px);z-index:20;background:var(--bg);margin:-16px -14px 0;padding:16px 14px 0;}
  .hero{
    background:linear-gradient(140deg,#1b3a63,#0f2238);
    border-radius:22px;padding:20px 20px 22px;color:#fff;
    box-shadow:0 10px 26px rgba(15,34,56,.28);
    display:flex;align-items:flex-end;justify-content:space-between;gap:14px;
  }
  .hero .left{min-width:0;flex:1;}
  .hero .left .lbl{font-size:13px;color:#aebfd6;font-weight:600;margin-bottom:6px;}
  .hero .left .amount{font-size:40px;font-weight:900;letter-spacing:-1px;white-space:nowrap;}
  .hero .left .amount .yen{font-size:20px;font-weight:700;color:#cdd9ea;margin-left:2px;}
  .hero .cb{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(245,166,35,.45);
    border-radius:16px;padding:12px 16px;text-align:right;min-width:130px;flex:none;
    box-shadow:inset 0 0 18px rgba(245,166,35,.12);
  }
  .hero .cb .lbl{font-size:11px;color:var(--orange);font-weight:700;margin-bottom:2px;}
  .hero .cb .val{font-size:30px;font-weight:900;color:var(--orange);letter-spacing:-.5px;}

  .section-title{font-size:15px;font-weight:800;color:var(--navy);margin:22px 4px 12px;}

  /* 決済手段カード */
  .m-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    margin-bottom:14px;overflow:hidden;position:relative;
  }
  .corner{position:absolute;top:0;left:0;width:0;height:0;border-style:solid;border-width:24px 24px 0 0;border-color:#ccc transparent transparent transparent;z-index:0;}
  .m-card .m-head{position:relative;z-index:1;}
  .badge-max{display:inline-block;margin-left:8px;background:#16a34a;color:#fff;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;vertical-align:middle;letter-spacing:.3px;box-shadow:0 1px 3px rgba(22,163,74,.35);}
  .m-card.maxed{background:#eefaf2;}
  .m-card.maxed .m-earn .v{color:#16a34a;}
  .m-card.maxed .bar > i{background:linear-gradient(90deg,#3ddc84,#16a34a);}
  .m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;}
  .m-name{display:flex;align-items:center;gap:11px;font-size:18px;font-weight:800;}
  .m-name .ico{width:30px;height:30px;flex:none;}
  .ico{background:#fff;border:1px solid #e9edf3;border-radius:24%;box-shadow:0 1px 3px rgba(20,40,80,.13);overflow:hidden;}
  .ico .payimg,.ico .paysvg{width:100%;height:100%;object-fit:contain;display:block;}
  .togo{margin:0 16px 12px;padding:9px 12px;background:#f2f7fd;border-radius:12px;font-size:12px;color:#64748b;line-height:1.6;}
  .togo .togo-top{font-size:12.5px;}
  .togo .togo-top b{color:#e08600;font-weight:800;font-size:15px;}
  .togo .b20{color:#e08600;font-weight:800;}
  .togo .b10{color:#2d7ff0;font-weight:800;}
  .togo .u{font-size:10.5px;color:#94a3b8;}
  .togo .need{display:block;margin-top:2px;}
  .togo .togo-bot{margin-top:3px;}
  .togo.done{text-align:center;color:#1f9d57;background:#eafaf0;font-weight:800;font-size:13.5px;}
  .cbsub{font-size:10px;color:#f3c98b;font-weight:700;margin-top:4px;line-height:1.3;}
  .m-earn{text-align:right;line-height:1.1;}
  .m-earn .v{font-size:24px;font-weight:900;}
  .m-earn .s{font-size:11px;color:var(--muted);font-weight:600;}
  .bar-wrap{padding:0 16px 12px;}
  .bar{height:7px;border-radius:6px;background:var(--track);overflow:hidden;}
  .bar > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#5aa6ff,#2d7ff0);transition:width .4s ease;}
  .bar-sub{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:7px;}
  .bar-sub .rem{color:#7a879a;}
  .rec-list{border-top:1px solid var(--line);}
  .rec{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:14px;}
  .rec:last-child{border-bottom:none;}
  .pill{font-size:12px;font-weight:800;padding:2px 8px;border-radius:8px;flex:none;}
  .pill.r20{background:#fff1da;color:#e08600;}
  .pill.r10{background:#e6f0ff;color:#1f6feb;}
  .rec .amt{color:#46546a;font-weight:600;}
  .rec .arr{color:var(--orange-strong);font-weight:800;}
  .rec .date{margin-left:auto;color:var(--muted-2);font-size:12px;}
  .rec .del{flex:none;width:26px;height:26px;border-radius:50%;border:none;background:#f1f4f8;color:#9aa6b5;font-size:15px;line-height:1;cursor:pointer;}
  .rec .del:active{background:#e2e7ee;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:6px 0 2px;}

  /* ===== 記録する ===== */
  .panel{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:20px 18px 22px;}
  .panel-title{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:800;margin-bottom:18px;}
  .panel-title::before{content:"";width:5px;height:20px;border-radius:3px;background:var(--blue);}
  .field-label{font-size:13px;font-weight:700;color:#6b7686;margin:0 2px 9px;}
  .pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .pay-btn{
    background:#fff;border:1.5px solid var(--line);border-radius:14px;
    padding:14px 4px 11px;text-align:center;cursor:pointer;transition:.15s;
  }
  .pay-btn .ico{display:block;width:42px;height:42px;margin:0 auto 8px;}
  .pay-btn .nm{font-size:13px;font-weight:700;color:#46546a;}
  .pay-btn.sel{border-color:var(--blue);background:var(--blue-soft);box-shadow:0 0 0 3px rgba(45,127,240,.12);}
  .pay-btn.sel .nm{color:var(--blue-deep);}
  .pay-btn:active{transform:scale(.97);}

  .rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .rate-btn{
    border:1.5px solid var(--line);border-radius:16px;background:#fff;
    padding:16px 8px;text-align:center;cursor:pointer;transition:.15s;
  }
  .rate-btn .pct{font-size:32px;font-weight:900;line-height:1;}
  .rate-btn .sub{font-size:12px;font-weight:700;color:var(--muted);margin-top:6px;}
  .rate-btn.r10 .pct{color:var(--blue-deep);}
  .rate-btn.r20 .pct{color:var(--orange-strong);}
  .rate-btn.r10.sel{border-color:var(--blue);background:var(--blue-soft);}
  .rate-btn.r20.sel{border-color:var(--orange);background:#fff6e7;}
  .rate-btn.sel .sub{color:#46546a;}
  .rate-btn:active{transform:scale(.98);}

  .amount-input{
    width:100%;border:1.5px solid var(--line);border-radius:14px;
    padding:15px 16px;font-size:26px;font-weight:800;color:var(--text);
    background:#fff;outline:none;transition:.15s;
  }
  .amount-input::placeholder{color:#c2cad6;font-weight:600;}
  .amount-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,127,240,.12);}

  .preview{
    background:var(--blue-soft);border-radius:14px;padding:14px 16px;margin:18px 0 6px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .preview .pl{font-size:15px;font-weight:800;color:var(--blue-deep);}
  .preview .pl small{display:block;font-size:11px;font-weight:600;color:#7d93b5;margin-top:1px;}
  .preview .pv{font-size:30px;font-weight:900;color:var(--blue-deep);letter-spacing:-.5px;}
  .preview.warn{background:#fff6e7;}
  .preview.warn .pl,.preview.warn .pv{color:var(--orange-strong);}
  .note{font-size:12px;color:#a06600;background:#fff6e7;border-radius:10px;padding:8px 12px;margin-top:10px;display:none;}
  .note.show{display:block;}

  .submit{
    width:100%;margin-top:16px;border:none;border-radius:15px;
    padding:17px;font-size:17px;font-weight:800;color:#fff;cursor:pointer;
    background:#aeb8c6;transition:.15s;
  }
  .submit.on{background:linear-gradient(135deg,#2d7ff0,#1f6feb);box-shadow:0 6px 16px rgba(45,127,240,.35);}
  .submit.on:active{transform:scale(.99);}

  /* ===== 履歴 ===== */
  .hist-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
  .hist-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px;}
  .hist-row:last-child{border-bottom:none;}
  .hist-row .ico{width:26px;height:26px;flex:none;}
  .hist-row .nm{font-weight:700;}
  .hist-row .date{margin-left:auto;color:var(--muted-2);font-size:12px;}
  .hist-row .del{flex:none;width:26px;height:26px;border-radius:50%;border:none;background:#f1f4f8;color:#9aa6b5;font-size:15px;cursor:pointer;}
  .hist-row .money{flex-basis:100%;display:flex;align-items:center;gap:10px;padding-left:34px;}
  .hist-row .amt{color:#46546a;font-weight:600;}
  .hist-row .arr{color:#ff9a00;font-weight:800;}
  .reset-btn{display:block;margin:18px auto 0;background:none;border:none;color:#c05b5b;font-size:13px;font-weight:700;cursor:pointer;padding:8px 14px;}
  .hist-empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;}
  .hist-empty .big{font-size:40px;margin-bottom:10px;}

  /* 履歴ツールバー・カレンダー・日付入力 */
  .hist-toolbar{display:flex;gap:8px;align-items:center;margin:0 2px 14px;}
  .seg{display:inline-flex;background:#e6ecf4;border-radius:11px;padding:3px;gap:2px;}
  .seg-btn{display:inline-flex;align-items:center;gap:5px;border:none;background:none;font-size:13px;font-weight:700;color:#6b7686;padding:6px 11px;border-radius:9px;cursor:pointer;font-family:inherit;}
  .seg-ic{width:16px;height:16px;flex:none;}
  .seg-btn.active{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(20,40,80,.14);}
  .hist-filter{margin-left:auto;border:1.5px solid var(--line);border-radius:10px;padding:7px 10px;font-size:13px;font-weight:700;color:var(--navy);background:#fff;font-family:inherit;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 10px;}
  .cal-arrow{border:none;background:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;color:var(--navy);box-shadow:var(--shadow-soft);cursor:pointer;}
  .cal-arrow:active{background:#eef2f7;}
  .cal-title{font-size:16px;font-weight:800;color:var(--navy);display:flex;flex-direction:column;align-items:center;line-height:1.25;}
  .cal-mtotal{font-size:11px;font-weight:700;color:#e08600;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#fff;border-radius:16px;padding:10px;box-shadow:var(--shadow);}
  .cal-wd{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:2px 0;}
  .cal-wd.sun{color:#e15b5b;} .cal-wd.sat{color:#4a86e8;}
  .cal-cell{border:none;background:#f5f8fb;border-radius:9px;min-height:48px;padding:5px 2px 3px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;}
  .cal-cell.empty{background:transparent;}
  .cal-d{font-size:12px;font-weight:700;color:var(--navy);}
  .cal-cell.sun .cal-d{color:#e15b5b;} .cal-cell.sat .cal-d{color:#4a86e8;}
  .cal-cell.has{background:#fff3e0;}
  .cal-cb{font-size:9px;font-weight:800;color:#e08600;line-height:1;}
  .cal-cell.sel{outline:2px solid var(--blue);outline-offset:-2px;background:#e9f2ff;}
  .cal-detail{margin-top:16px;}
  .cal-detail-h{font-size:13px;font-weight:800;color:var(--navy);margin:0 4px 8px;}
  .date-input{-webkit-appearance:none;appearance:none;display:block;width:100%;max-width:100%;min-width:0;box-sizing:border-box;border:1.5px solid var(--line);border-radius:14px;padding:13px 16px;font-size:17px;font-weight:700;color:var(--text);background:#fff;outline:none;font-family:inherit;}
  .date-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,127,240,.12);}

  /* ===== ボトムナビ ===== */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    max-width:520px;margin:0 auto;
    background:rgba(255,255,255,.96);backdrop-filter:saturate(180%) blur(12px);
    border-top:1px solid #e2e8f0;
    display:flex;justify-content:space-around;align-items:stretch;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{
    flex:1;background:none;border:none;cursor:pointer;
    padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);font-size:11px;font-weight:700;
  }
  .tab .ti{width:25px;height:25px;display:block;}
  .tab.active{color:var(--navy);}
  .tab .ti.plus{font-weight:900;}

  .legal{font-size:11px;color:#9aa6b5;text-align:center;line-height:1.6;margin:18px 8px 4px;}

  /* 告知バナー */
  .notice-bar{display:none;gap:10px;align-items:flex-start;padding:12px 14px;background:#eef4fd;border-bottom:1px solid #d4e3fb;}
  .notice-bar:not([hidden]){display:flex;}
  .notice-bar.alert{background:#fff4e5;border-bottom-color:#f4d9a8;}
  .notice-ic{font-size:20px;line-height:1.3;flex:none;}
  .notice-body{flex:1;min-width:0;}
  .notice-title{font-weight:800;font-size:14px;color:#1e3a8a;}
  .notice-bar.alert .notice-title{color:#b91c1c;}
  .notice-detail{font-size:12.5px;color:#39465c;margin-top:3px;line-height:1.6;word-break:break-word;}
  .notice-bar.alert .notice-detail{color:#7a4f00;}
  .notice-meta{margin-top:7px;display:flex;gap:14px;align-items:center;font-size:12px;color:#7d8aa3;flex-wrap:wrap;}
  .notice-meta a{color:#1f6feb;font-weight:800;text-decoration:none;}
  .notice-x{flex:none;border:none;background:rgba(30,58,138,.10);color:#39465c;width:26px;height:26px;border-radius:50%;font-size:15px;line-height:1;cursor:pointer;}
  .notice-bar.alert .notice-x{background:rgba(122,79,0,.14);color:#7a4f00;}
  /* 公式リンク・告知確認 */
  .official{text-align:center;margin:16px 8px 4px;}
  .official-link{display:inline-block;background:var(--navy);color:#fff;font-weight:700;font-size:13px;text-decoration:none;padding:11px 18px;border-radius:13px;box-shadow:0 3px 10px rgba(20,40,80,.18);}
  .official-link:active{transform:scale(.98);}
  .check-btn{display:block;margin:11px auto 0;background:#fff;border:1.5px solid var(--line);color:#46546a;font-weight:700;font-size:12px;padding:8px 14px;border-radius:10px;cursor:pointer;}
  .check-fb{font-size:11px;color:var(--muted);margin-top:9px;min-height:14px;line-height:1.5;}
</style>
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="brand"><a class="brand-link" href="https://www.kanatokucpn.pref.kanagawa.jp/index.html" target="_blank" rel="noopener" aria-label="かなトク！公式サイトを開く"><img src="./header.png" alt="かなトク！" class="brand-logo" /></a></div>
  </header>

  <div class="notice-bar" id="noticeBar" hidden>
    <span class="notice-ic" id="noticeIc">📢</span>
    <div class="notice-body">
      <div class="notice-title" id="noticeTitle"></div>
      <div class="notice-detail" id="noticeDetail"></div>
      <div class="notice-meta"><span id="noticeDate"></span><a id="noticeLink" href="#" target="_blank" rel="noopener">公式サイトで確認 ↗</a></div>
    </div>
    <button class="notice-x" id="noticeClose" aria-label="閉じる">×</button>
  </div>

  <main>
    <!-- ===== 還元状況 ===== -->
    <section id="view-status" class="view active">
      <div class="hero-wrap">
      <div class="hero">
        <div class="left">
          <div class="lbl">期間中 累計お支払い</div>
          <div class="amount"><span id="heroSpent">0</span><span class="yen">円</span></div>
        </div>
        <div class="cb">
          <div class="lbl">もらえる還元額</div>
          <div class="val" id="heroCb">¥0</div>
          <div class="cbsub" id="heroTogo"></div>
        </div>
      </div>
      </div>
      <div class="section-title">決済手段ごとの還元状況</div>
      <div id="methodList"></div>
      <p class="legal">還元率20%＝中小・小規模店／10%＝大手チェーン店。<br>1回あたり上限¥1,500・1サービスあたり期間中上限¥2,500。<br>予算上限（180億円）到達で早期終了の可能性があります。</p>
      <div class="official">
        <button class="check-btn" id="checkBtn">最新の告知をオンラインで確認</button>
        <div class="check-fb" id="checkFeedback"></div>
      </div>
    </section>

    <!-- ===== 記録する ===== -->
    <section id="view-record" class="view">
      <div class="panel">
        <div class="panel-title">お買い物を記録する</div>

        <div class="field-label">決済手段を選ぶ</div>
        <div class="pay-grid" id="payGrid"></div>

        <div class="field-label">お店の種類（還元率）</div>
        <div class="rate-grid">
          <button class="rate-btn r10 sel" data-rate="0.1">
            <div class="pct">10%</div><div class="sub">大手チェーン店</div>
          </button>
          <button class="rate-btn r20" data-rate="0.2">
            <div class="pct">20%</div><div class="sub">中小・個人店</div>
          </button>
        </div>

        <div class="field-label">お支払い金額（円）</div>
        <input class="amount-input" id="amountInput" type="text" inputmode="numeric" placeholder="例：3,280" autocomplete="off" />

        <div class="field-label" style="margin-top:18px;">日付</div>
        <input type="date" id="dateInput" class="date-input" />

        <div class="preview" id="preview">
          <div class="pl">この支払いの還元額<small id="previewSub">金額を入力してください</small></div>
          <div class="pv" id="previewVal">¥—</div>
        </div>
        <div class="note" id="recNote"></div>

        <button class="submit" id="submitBtn">記録する</button>
      </div>
    </section>

    <!-- ===== 履歴 ===== -->
    <section id="view-history" class="view">
      <div class="section-title" style="margin-top:6px;">記録の履歴</div>
      <div class="hist-toolbar">
        <div class="seg" id="histSeg">
          <button class="seg-btn active" data-mode="list"><svg class="seg-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 6.5h11M8.5 12h11M8.5 17.5h11"/><circle cx="4.4" cy="6.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="4.4" cy="12" r="1.15" fill="currentColor" stroke="none"/><circle cx="4.4" cy="17.5" r="1.15" fill="currentColor" stroke="none"/></svg>一覧</button>
          <button class="seg-btn" data-mode="calendar"><svg class="seg-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15" rx="3"/><path d="M3.5 9.5h17M8 3.3v3.2M16 3.3v3.2"/></svg>カレンダー</button>
        </div>
        <select class="hist-filter" id="histFilter"></select>
      </div>
      <div id="historyArea"></div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="status"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11.2 12 4l9 7.2"/><path d="M5.2 9.6V20h13.6V9.6"/><path d="M9.5 20v-5.3h5V20"/></svg>還元状況</button>
    <button class="tab" data-view="record"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>記録する</button>
    <button class="tab" data-view="history"><svg class="ti" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.3"/><path d="M12 7.3V12l3.2 1.9"/></svg>履歴</button>
  </nav>
</div>

<script>
/* ===== 設定 ===== */
const METHODS = [
  { id:"paypay",  name:"PayPay",   color:"#ff0033", img:"iconpay-paypay.png"  },
  { id:"rakuten", name:"楽天Pay",  color:"#bf0000", img:"iconpay-rakuten.png" },
  { id:"d",       name:"d払い",    color:"#e60012", img:"iconpay-d.png"       },
  { id:"au",      name:"au PAY",   color:"#eb5505", img:"iconpay-au.png"      },
  { id:"merpay",  name:"メルペイ",  color:"#ff0211", img:"iconpay-merpay.png"  },
  { id:"aeon",    name:"AEON Pay", color:"#a0006e", img:"iconpay-aeon.png"    },
];
const M = Object.fromEntries(METHODS.map(m=>[m.id,m]));
// 決済ブランド風アイコン（角丸の正方形タイル＋サービス名）を SVG で生成
function payIcon(m){
  if(!m) return "💳";
  if(m.img) return `<img src="./${m.img}" alt="${m.name}" class="payimg" />`;
  // 画像が無い決済（d払い）は白タイル上にブランド色の文字で表現
  const lines = m.lines || [m.name];
  const fs = m.fs || 34;
  const n = lines.length;
  const lh = fs * 1.04;
  const startY = 51 - (n - 1) * lh / 2;
  const col = m.color || "#333";
  const texts = lines.map((s, i) =>
    `<text x="50" y="${(startY + i*lh).toFixed(1)}" text-anchor="middle" dominant-baseline="central" `
    + `font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-weight="800" `
    + `font-size="${fs}" letter-spacing="-1" fill="${col}">${s}</text>`).join("");
  return `<svg viewBox="0 0 100 100" class="paysvg" style="display:block;width:100%;height:100%" aria-hidden="true">${texts}</svg>`;
}
const CAP_TX = 1500;      // 1回あたり還元上限
const CAP_METHOD = 2500;  // 1サービスあたり期間中上限
const STORE_KEY = "kanatoku_records_v1";

/* ===== 状態 ===== */
let records = load();
let sel = { method:null, rate:0.1 };
let histMode = "list";    // 履歴の表示：list / calendar
let histFilter = "all";   // 決済フィルタ：all / 各method
let calView = null;       // カレンダー表示中の {y, m(0-11)}
let selDay = null;        // カレンダーで選択中の日付 "YYYY/MM/DD"

/* ===== ユーティリティ ===== */
function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }catch(e){ return []; } }
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(records)); }
const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
const num = n => Math.round(n).toLocaleString("ja-JP");
function todayStr(){ const d=new Date(),z=x=>String(x).padStart(2,"0"); return `${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())}`; }
function todayISO(){ const d=new Date(),z=x=>String(x).padStart(2,"0"); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`; }
// 1件分の還元額（1回上限を適用）
function cashbackOf(amount, rate){ return Math.min(Math.floor(amount*rate), CAP_TX); }

/* ===== 集計 ===== */
function summary(){
  const byM = {};
  METHODS.forEach(m => byM[m.id] = { list:[], sum:0 });
  records.forEach(r => { if(byM[r.method]){ byM[r.method].list.push(r); byM[r.method].sum += r.cashback; } });
  let totalCb = 0, totalSpent = 0;
  METHODS.forEach(m => {
    const b = byM[m.id];
    b.list.sort((a,c)=> c.ts - a.ts);
    b.capped = Math.min(b.sum, CAP_METHOD);
    b.remaining = CAP_METHOD - b.capped;
    totalCb += b.capped;
  });
  records.forEach(r => totalSpent += r.amount);
  return { byM, totalCb, totalSpent };
}

/* ===== 描画：還元状況 ===== */
function render(){
  const s = summary();
  const spentStr = num(s.totalSpent);
  document.getElementById("heroSpent").textContent = spentStr;
  // 桁数に応じて累計額のフォントを自動縮小（右の還元額を圧迫しない）
  const amtEl = document.querySelector(".hero .amount");
  if(amtEl){ const L = spentStr.length; amtEl.style.fontSize = (L<=6 ? 40 : L<=8 ? 33 : L<=10 ? 27 : 22) + "px"; }
  document.getElementById("heroCb").textContent = yen(s.totalCb);
  const togoTotal = Math.max(0, CAP_METHOD * METHODS.length - s.totalCb);
  document.getElementById("heroTogo").textContent = togoTotal > 0 ? `満額まで あと ${yen(togoTotal)}` : "満額達成 🎉";

  const list = document.getElementById("methodList");
  list.innerHTML = METHODS.map(m => {
    const b = s.byM[m.id];
    const pct = Math.min(100, b.capped / CAP_METHOD * 100);
    const recs = b.list.map(r => `
      <div class="rec">
        <span class="pill ${r.rate>=0.2?"r20":"r10"}">${Math.round(r.rate*100)}%</span>
        <span class="amt">${yen(r.amount)}</span>
        <span class="arr">→${yen(r.cashback)}</span>
        <span class="date">${r.date}</span>
        <button class="del" data-del="${r.id}" aria-label="削除">×</button>
      </div>`).join("");
    const maxed = b.remaining <= 0 && b.capped > 0;
    return `
      <div class="m-card${maxed ? " maxed" : ""}">
        <span class="corner" style="border-top-color:${m.color}"></span>
        <div class="m-head">
          <div class="m-name"><span class="ico">${payIcon(m)}</span>${m.name}${maxed ? `<span class="badge-max">満額達成</span>` : ""}</div>
          <div class="m-earn"><div class="v">${yen(b.capped)}</div><div class="s">${maxed ? "満額 🎉" : "還元済み"}</div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar"><i style="width:${pct}%"></i></div>
          <div class="bar-sub"><span>¥0</span><span class="rem">残り ${yen(b.remaining)} / 上限 ${yen(CAP_METHOD)}</span></div>
        </div>
        ${b.remaining > 0
          ? `<div class="togo"><div class="togo-top">満額まで あと <b>${yen(b.remaining)}</b></div><div class="togo-bot">必要なお買い物：<span class="need"><b class="b20">${yen(b.remaining*5)}</b><span class="u">（20%店）</span></span><span class="need"><b class="b10">${yen(b.remaining*10)}</b><span class="u">（10%店）</span></span></div></div>`
          : `<div class="togo done">🎉 上限 ¥2,500 達成！満額ゲット</div>`}
        ${recs ? `<div class="rec-list">${recs}</div>` : ""}
      </div>`;
  }).join("");

  renderHistory();
}

/* ===== 描画：履歴（一覧 / カレンダー） ===== */
function histFiltered(){
  return records.filter(r => histFilter === "all" || r.method === histFilter);
}
function histRowHtml(r){
  const m = M[r.method] || {name:r.method};
  return `<div class="hist-row">
        <span class="ico">${payIcon(m)}</span>
        <span class="nm">${m.name}</span>
        <span class="date">${r.date}</span>
        <button class="del" data-del="${r.id}" aria-label="削除">×</button>
        <div class="money">
          <span class="pill ${r.rate>=0.2?"r20":"r10"}">${Math.round(r.rate*100)}%</span>
          <span class="amt">${yen(r.amount)}</span>
          <span class="arr">→${yen(r.cashback)}</span>
        </div>
      </div>`;
}
function renderHistory(){
  // ツールバーの状態を反映
  document.querySelectorAll("#histSeg .seg-btn").forEach(b=>b.classList.toggle("active", b.dataset.mode===histMode));
  const fsel = document.getElementById("histFilter");
  if(fsel && fsel.value !== histFilter) fsel.value = histFilter;

  const area = document.getElementById("historyArea");
  const data = histFiltered();
  if(histMode === "calendar"){ area.innerHTML = calendarHtml(data); return; }

  if(!data.length){
    area.innerHTML = `<div class="hist-empty"><div class="big">🧾</div>${histFilter==="all" ? "まだ記録がありません。<br>「＋ 記録する」から登録しましょう。" : "この決済の記録はありません。"}</div>`;
    return;
  }
  const all = [...data].sort((a,b)=> (a.date<b.date?1:a.date>b.date?-1:0) || (b.ts-a.ts));
  area.innerHTML = `<div class="hist-card">${all.map(histRowHtml).join("")}</div>
    <button class="reset-btn" id="resetBtn">すべての記録を削除</button>`;
}
function calendarHtml(data){
  const z = x => String(x).padStart(2,"0");
  if(!calView){
    let d = new Date();
    if(records.length){
      const recent = [...records].sort((a,b)=> a.date<b.date?1:-1)[0];
      const p = recent.date.split("/"); d = new Date(+p[0], +p[1]-1, 1);
    }
    calView = { y:d.getFullYear(), m:d.getMonth() };
  }
  const { y, m } = calView;
  const days = new Date(y, m+1, 0).getDate();
  const startWd = new Date(y, m, 1).getDay();
  const byDay = {};
  data.forEach(r => { const o = (byDay[r.date] = byDay[r.date] || {cb:0,cnt:0}); o.cb += r.cashback; o.cnt++; });
  const wd = ["日","月","火","水","木","金","土"];
  let cells = wd.map((w,i)=>`<div class="cal-wd ${i===0?"sun":""} ${i===6?"sat":""}">${w}</div>`).join("");
  for(let i=0;i<startWd;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=days; d++){
    const ds = `${y}/${z(m+1)}/${z(d)}`;
    const info = byDay[ds];
    const wdi = (startWd + d - 1) % 7;
    const tint = wdi===0?"sun":wdi===6?"sat":"";
    cells += `<button class="cal-cell ${info?"has":""} ${selDay===ds?"sel":""} ${tint}" data-day="${ds}"><span class="cal-d">${d}</span>${info?`<span class="cal-cb">¥${info.cb.toLocaleString("ja-JP")}</span>`:""}</button>`;
  }
  const monthPrefix = `${y}/${z(m+1)}/`;
  const monthTotal = data.filter(r=>r.date.startsWith(monthPrefix)).reduce((s,r)=>s+r.cashback,0);
  let detail = "";
  if(selDay){
    const dr = data.filter(r=>r.date===selDay).sort((a,b)=>b.ts-a.ts);
    detail = `<div class="cal-detail"><div class="cal-detail-h">${selDay} の記録（還元 ${yen(dr.reduce((s,r)=>s+r.cashback,0))}）</div>`
      + (dr.length ? `<div class="hist-card">${dr.map(histRowHtml).join("")}</div>` : `<div class="empty">この日の記録はありません</div>`)
      + `</div>`;
  }
  return `<div class="cal-nav">
      <button class="cal-arrow" data-cal="-1" aria-label="前の月">‹</button>
      <div class="cal-title">${y}年${m+1}月<span class="cal-mtotal">この月の還元 ${yen(monthTotal)}</span></div>
      <button class="cal-arrow" data-cal="1" aria-label="次の月">›</button>
    </div>
    <div class="cal-grid">${cells}</div>${detail}`;
}

/* ===== 記録フォーム ===== */
function buildPayGrid(){
  document.getElementById("payGrid").innerHTML = METHODS.map(m =>
    `<button class="pay-btn" data-method="${m.id}"><span class="ico">${payIcon(m)}</span><span class="nm">${m.name}</span></button>`
  ).join("");
}

function rawAmount(){
  const v = document.getElementById("amountInput").value.replace(/[^\d]/g,"");
  return v ? parseInt(v,10) : 0;
}

function updatePreview(){
  const amount = rawAmount();
  const prev = document.getElementById("preview");
  const sub  = document.getElementById("previewSub");
  const val  = document.getElementById("previewVal");
  const note = document.getElementById("recNote");
  const btn  = document.getElementById("submitBtn");

  const ready = sel.method && amount > 0;
  btn.classList.toggle("on", !!ready);

  if(amount <= 0){
    val.textContent = "¥—";
    sub.textContent = sel.method ? "金額を入力してください" : "決済手段と金額を選んでください";
    prev.classList.remove("warn");
    note.classList.remove("show");
    return;
  }
  const cb = cashbackOf(amount, sel.rate);
  val.textContent = yen(cb);
  sub.textContent = `${Math.round(sel.rate*100)}% 還元`;

  // 注意書き（1回上限・サービス上限）
  const msgs = [];
  if(Math.floor(amount*sel.rate) > CAP_TX) msgs.push("1回の還元上限 ¥1,500 を適用しました。");
  if(sel.method){
    const b = summary().byM[sel.method];
    if(cb > b.remaining){
      msgs.push(`${M[sel.method].name} の期間上限まで残り ${yen(b.remaining)}。超過分は還元対象外です。`);
    }
  }
  if(msgs.length){ note.textContent = "※ " + msgs.join(" "); note.classList.add("show"); prev.classList.add("warn"); }
  else { note.classList.remove("show"); prev.classList.remove("warn"); }
}

function addRecord(){
  const amount = rawAmount();
  if(!sel.method || amount <= 0) return;
  const cb = cashbackOf(amount, sel.rate);
  const iso = document.getElementById("dateInput").value || todayISO();
  records.push({
    id: "r" + Date.now() + Math.floor(Math.random()*1000),
    ts: Date.now(),
    method: sel.method,
    rate: sel.rate,
    amount,
    cashback: cb,
    date: iso.replace(/-/g, "/"),
  });
  save();
  // フォームをリセット
  document.getElementById("amountInput").value = "";
  document.getElementById("dateInput").value = todayISO();
  document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("sel"));
  sel.method = null;
  updatePreview();
  render();
  switchView("status");
}

function deleteRecord(id){
  records = records.filter(r => r.id !== id);
  save();
  render();
  updatePreview();
}

/* ===== 公式サイトの新着情報の取得・表示 ===== */
const OFFICIAL_URL = "https://www.kanatokucpn.pref.kanagawa.jp/index.html";
const NOTICE_KW = ["予算", "見込み", "上限", "到達", "終了", "受付終了"];   // 重要告知の判定語
const NEWS_LIMIT = 3;   // バナーに表示する新着情報の最大件数（変更可）
const PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(u),
];
const escHtml = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

function newsSig(news){ return (news || []).map(n => (n.date||"") + "|" + (n.title||"")).join("§"); }
function newsHasAlert(news){ return (news || []).some(n => NOTICE_KW.some(k => (n.title||"").includes(k))); }

// 新着情報をバナーに表示（news=[{date,title},...]、alert=予算/終了など重要か）
function showNews(news, alert){
  if(!news || !news.length) return;
  const sig = newsSig(news);
  if(localStorage.getItem("kanatoku_notice_dismissed") === sig) return; // 既読（×で閉じた同一内容）は出さない
  document.getElementById("noticeIc").textContent = alert ? "📢" : "📰";
  document.getElementById("noticeTitle").textContent = alert ? "⚠️ キャンペーンに関する重要なお知らせ" : "公式サイトの新着情報";
  document.getElementById("noticeDetail").innerHTML = news.slice(0, NEWS_LIMIT)
    .map(n => "・" + (n.date ? escHtml(n.date) + " " : "") + escHtml(n.title)).join("<br>");
  document.getElementById("noticeDate").textContent = "";
  document.getElementById("noticeLink").href = OFFICIAL_URL;
  const bar = document.getElementById("noticeBar");
  bar.classList.toggle("alert", !!alert);
  bar.dataset.sig = sig;
  bar.hidden = false;
}

// ページ内の <li> のうち先頭が日付(YYYY/MM/DD)の項目＝新着情報を最大3件抽出
// （日付の無いナビメニュー等は自動的に除外される）
function parseNews(html){
  const items = [];
  for(const li of (html.match(/<li[\s\S]*?<\/li>/g) || [])){
    const t = li.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
    const m = t.match(/(\d{4}[.\/]\d{1,2}[.\/]\d{1,2})\s*(.+)/);
    if(m){
      const title = m[2].trim().replace(/([「『（])\s+/g, "$1").replace(/\s+([」』）])/g, "$1");
      items.push({ date: m[1].replace(/\./g, "/"), title });
      if(items.length >= NEWS_LIMIT) break;
    }
  }
  return items;
}

// 同一オリジンの notice.json（GitHub Actions/手動更新）を読む＝確実な本命ルート
async function loadNoticeJson(){
  try{
    const r = await fetch("./notice.json?t=" + Date.now(), { cache: "no-store" });
    if(r.ok){
      const j = await r.json();
      if(j && Array.isArray(j.news) && j.news.length){ showNews(j.news, j.alert != null ? j.alert : newsHasAlert(j.news)); return true; }
      if(j && j.active){ showNews([{ date:j.date||"", title:j.detail||j.title||"" }], true); return true; } // 旧スキーマ後方互換
    }
  }catch(e){}
  return false;
}

// CORSプロキシ経由で公式サイトを取得して新着情報を返す（ベストエフォート）
async function fetchNewsLive(){
  for(const make of PROXIES){
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 8000);
    try{
      const res = await fetch(make(OFFICIAL_URL), { signal: ctrl.signal });
      clearTimeout(to);
      if(!res.ok) continue;
      const news = parseNews(await res.text());
      if(news.length) return news;        // 取得＆解析できたら採用
    }catch(e){ clearTimeout(to); /* 次のプロキシへ */ }
  }
  return [];
}

// 起動時の自動取得（1時間に1回まで・結果はキャッシュ。notice.json で出せた場合は呼ばない）
async function autoNewsCheck(){
  const last = +(localStorage.getItem("kanatoku_news_at") || 0);
  let cached = null;
  try{ cached = JSON.parse(localStorage.getItem("kanatoku_news_cache") || "null"); }catch(e){}
  if(cached && cached.news && (Date.now() - last < 3600000)){ showNews(cached.news, cached.alert); return; }
  try{
    const news = await fetchNewsLive();
    if(news.length){
      const alert = newsHasAlert(news);
      localStorage.setItem("kanatoku_news_cache", JSON.stringify({ news, alert }));
      localStorage.setItem("kanatoku_news_at", String(Date.now()));
      showNews(news, alert);
    }
  }catch(e){}
}

// 手動ボタン：今すぐ取得して表示（既読でも一度再表示）
async function liveCheck(){
  const fb = document.getElementById("checkFeedback");
  fb.textContent = "確認中…";
  try{
    const news = await fetchNewsLive();
    if(news.length){
      const alert = newsHasAlert(news);
      localStorage.setItem("kanatoku_news_cache", JSON.stringify({ news, alert }));
      localStorage.setItem("kanatoku_news_at", String(Date.now()));
      localStorage.removeItem("kanatoku_notice_dismissed"); // 手動確認時は再表示
      showNews(news, alert);
      fb.textContent = (alert ? "⚠️ 重要な告知の可能性があります。" : "最新の新着情報を表示しました。") + "（" + new Date().toLocaleString("ja-JP") + "）";
    }else{
      fb.textContent = "取得できませんでした。自動更新（GitHub Actions）が有効なら数時間ごとに反映されます。";
    }
  }catch(e){
    fb.textContent = "オンライン確認に失敗しました。自動更新が有効なら数時間ごとに反映されます。";
  }
}

/* ===== ビュー切替 ===== */
function switchView(v){
  document.querySelectorAll(".view").forEach(s=>s.classList.remove("active"));
  document.getElementById("view-" + v).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.view===v));
  window.scrollTo({top:0});
}

/* ===== イベント ===== */
function init(){
  buildPayGrid();
  // 履歴の決済フィルタ選択肢
  document.getElementById("histFilter").innerHTML =
    `<option value="all">すべての決済</option>` + METHODS.map(m=>`<option value="${m.id}">${m.name}</option>`).join("");
  // 記録フォームの日付＝今日
  document.getElementById("dateInput").value = todayISO();
  render();

  // ヒーロー固定用：ヘッダー高さを測って CSS 変数に反映（固定位置をヘッダー直下にそろえる）
  const setHeaderH = () => document.documentElement.style.setProperty("--header-h", document.querySelector(".app-header").offsetHeight + "px");
  setHeaderH();
  window.addEventListener("resize", setHeaderH);
  window.addEventListener("orientationchange", setHeaderH);

  // タブ
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchView(t.dataset.view)));

  // 決済手段選択
  document.getElementById("payGrid").addEventListener("click", e=>{
    const btn = e.target.closest(".pay-btn"); if(!btn) return;
    document.querySelectorAll(".pay-btn").forEach(b=>b.classList.remove("sel"));
    btn.classList.add("sel");
    sel.method = btn.dataset.method;
    updatePreview();
  });

  // 還元率選択
  document.querySelectorAll(".rate-btn").forEach(b=>b.addEventListener("click",()=>{
    document.querySelectorAll(".rate-btn").forEach(x=>x.classList.remove("sel"));
    b.classList.add("sel");
    sel.rate = parseFloat(b.dataset.rate);
    updatePreview();
  }));

  // 金額入力（カンマ整形）
  const inp = document.getElementById("amountInput");
  inp.addEventListener("input", ()=>{
    const v = inp.value.replace(/[^\d]/g,"");
    inp.value = v ? parseInt(v,10).toLocaleString("ja-JP") : "";
    updatePreview();
  });

  // 記録ボタン
  document.getElementById("submitBtn").addEventListener("click", addRecord);

  // 履歴：決済フィルタ
  document.getElementById("histFilter").addEventListener("change", e=>{ histFilter = e.target.value; selDay = null; renderHistory(); });

  // 告知バナー：notice.json を読み込み、閉じる/即時確認を配線
  loadNoticeJson().then(shown => { if(!shown) autoNewsCheck(); });
  document.getElementById("noticeClose").addEventListener("click", ()=>{
    const bar = document.getElementById("noticeBar");
    if(bar.dataset.sig) localStorage.setItem("kanatoku_notice_dismissed", bar.dataset.sig);
    bar.hidden = true;
  });
  document.getElementById("checkBtn").addEventListener("click", liveCheck);

  // クリック委任（削除・全削除・履歴モード切替・カレンダー操作）
  document.body.addEventListener("click", e=>{
    const del = e.target.closest("[data-del]");
    if(del){ if(confirm("この記録を削除しますか？")) deleteRecord(del.dataset.del); return; }
    if(e.target.id === "resetBtn"){ if(confirm("すべての記録を削除します。よろしいですか？")){ records=[]; save(); render(); } return; }
    const seg = e.target.closest("#histSeg .seg-btn");
    if(seg){ histMode = seg.dataset.mode; renderHistory(); return; }
    const arrow = e.target.closest("[data-cal]");
    if(arrow){ if(calView){ let mm = calView.m + (+arrow.dataset.cal), yy = calView.y; if(mm<0){mm=11;yy--;} if(mm>11){mm=0;yy++;} calView = {y:yy, m:mm}; selDay = null; renderHistory(); } return; }
    const cell = e.target.closest(".cal-cell[data-day]");
    if(cell){ selDay = selDay===cell.dataset.day ? null : cell.dataset.day; renderHistory(); return; }
  });
}
init();

/* ===== Service Worker 登録 ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>
</body>
